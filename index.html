<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell - 让美好发声</title>
    <!-- 修复：使用可用的字体链接 -->
    <link rel="stylesheet" href="https://fonts.zeoseven.com/zsft/api/font/huiwen-mingchao/family.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Huiwen Mingchao', 'LXGW WenKai', 'Noto Serif SC', 'SimHei', serif;
            font-weight: normal;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        
        .content {
            text-align: center;
            z-index: 1;
            max-width: 90%;
        }
        
        /* 修复：改为水平排列，一行显示四个按钮 */
        .content > div {
            display: flex;
            flex-direction: row;      /* 改为水平排列 */
            flex-wrap: wrap;          /* 手机屏幕过窄时可换行 */
            justify-content: center;  /* 水平居中 */
            align-items: center;
            gap: 20px;                /* 按钮之间的间距 */
            margin-top: 30px;
        }
        
        .content a.link {
            display: inline-block;
            min-width: 100px;
        }
        
        .content span {
            margin-top: 20px;
            display: block;           /* 让版权信息独占一行 */
            width: 100%;              /* 占满整行 */
        }
        
        /* 链接样式 */
        .link {
            color: white !important;
            text-decoration: none;
            font-size: 20px;
            padding: 12px 28px;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
        }
        
        .link:visited {
            color: white !important;
        }
        
        .link:hover {
            background: rgba(224, 0, 0, 0.85);
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(224, 0, 0, 0.5);
            font-size: 20px;  /* 保持字号一致，用scale实现放大效果 */
        }
        
        img {
            border-radius: 15px;
            max-width: 280px;
            width: 90%;
        }
        
        /* 响应式：手机屏幕时按钮适当缩小间距 */
        @media (max-width: 560px) {
            .content > div {
                gap: 12px;
            }
            .link {
                font-size: 16px;
                padding: 8px 20px;
            }
        }

        /* 太空粒子特效样式 */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        
        a {
            font-family: 'Huiwen Mingchao', 'LXGW WenKai', 'Noto Serif SC', serif;
        }
    </style>
</head>
<body>
    
    <div class="overlay"></div>
    
    <div class="content">
        <img src="/img/redlogo.png" alt="HellYell" style="width: 180px; height: auto;">
        <div>
            <a href="https://radio.hellyell.com" target="_blank" class="link">📻 电台</a>
            <a href="https://iptvindex.com" target="_blank" class="link">🎬 影视</a>
            <a href="https://tansuo.tv" target="_blank" class="link">✨ 探索TV</a>
            <a href="https://dh.hellyell.com" target="_blank" class="link">⚡ Win必装</a>
            <span>唛塔文化 © 2016-2026</span>
        </div>
    </div>

    <canvas id="space-canvas"></canvas>
    
    <script>
        // 增强版流星特效 - 更逼真自然的流星效果
        (function() {
            const canvas = document.getElementById('space-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let stars = [];
            let meteors = [];
            let mouseX = 0, mouseY = 0;
            let mousePresent = false;
            
            const METEOR_COUNT = 1;      // 增加流星数量，更丰富
            const STARS_COUNT = 400;      // 增加星星数量，更深邃
            
            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                // 初始化背景星星（增加层次感）
                stars = [];
                for (let i = 0; i < STARS_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2.5 + 0.3,
                        brightness: Math.random() * 0.8 + 0.2,
                        twinkleSpeed: Math.random() * 0.03 + 0.005,
                        twinklePhase: Math.random() * Math.PI * 2,
                        layer: Math.random() > 0.7 ? 'deep' : 'normal'  // 深浅层星星
                    });
                }
                
                meteors = [];
                for (let i = 0; i < METEOR_COUNT; i++) {
                    meteors.push(createMeteor());
                }
            }
            
            function createMeteor() {
                // 流星从顶部或左上角方向划过的概率更高，更自然
                const direction = Math.random();
                let startX, startY;
                let angle;
                
                if (direction < 0.7) {
                    // 大部分流星从左上到右下方向划过
                    startX = -Math.random() * width * 0.3;
                    startY = -Math.random() * height * 0.2;
                    angle = Math.PI / 4 + (Math.random() - 0.5) * Math.PI / 6; // 45度角左右
                } else if (direction < 0.85) {
                    // 从右上到左下
                    startX = width + Math.random() * width * 0.2;
                    startY = -Math.random() * height * 0.2;
                    angle = Math.PI * 3 / 4 + (Math.random() - 0.5) * Math.PI / 6;
                } else {
                    // 偶尔横向划过
                    startX = -Math.random() * width * 0.5;
                    startY = Math.random() * height * 0.4;
                    angle = Math.PI / 6 + (Math.random() - 0.5) * Math.PI / 4;
                }
                
                // 速度：快速划过，有快有慢
                const speed = Math.random() * 12 + 8;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                // 流星颜色：暖色更真实（白黄橙）
                const colorTemp = Math.random();
                let headColor, tailStart, tailEnd;
                
                if (colorTemp < 0.5) {
                    // 白炽色
                    headColor = `rgba(255, 255, 240, 1)`;
                    tailStart = `rgba(255, 220, 160, 0.9)`;
                    tailEnd = `rgba(255, 180, 100, 0)`;
                } else if (colorTemp < 0.8) {
                    // 暖橙色
                    headColor = `rgba(255, 200, 120, 1)`;
                    tailStart = `rgba(255, 160, 80, 0.85)`;
                    tailEnd = `rgba(255, 100, 50, 0)`;
                } else {
                    // 冷白带蓝
                    headColor = `rgba(220, 240, 255, 1)`;
                    tailStart = `rgba(160, 200, 255, 0.8)`;
                    tailEnd = `rgba(100, 150, 255, 0)`;
                }
                
                return {
                    x: startX, y: startY,
                    vx: vx, vy: vy,
                    headColor: headColor,
                    tailStart: tailStart,
                    tailEnd: tailEnd,
                    size: Math.random() * 2.2 + 1.8,      // 头部大小
                    tailLength: Math.random() * 100 + 70, // 尾迹长度（像素）
                    trail: [],
                    life: 1.0,                           // 生命周期，用于淡出效果
                    fading: false
                };
            }
            
            function updateMeteors() {
                for (let i = 0; i < meteors.length; i++) {
                    const m = meteors[i];
                    
                    // 记录当前帧位置用于绘制尾迹
                    m.trail.push({
                        x: m.x,
                        y: m.y,
                        age: 0
                    });
                    
                    // 限制尾迹点数，根据尾迹长度自动调整
                    const maxTrailPoints = Math.floor(m.tailLength / 8);
                    while (m.trail.length > maxTrailPoints) {
                        m.trail.shift();
                    }
                    
                    // 更新位置
                    m.x += m.vx;
                    m.y += m.vy;
                    
                    // 尾迹点老化
                    for (let j = 0; j < m.trail.length; j++) {
                        m.trail[j].age += 0.08;
                    }
                    
                    // 移除过老的尾迹点
                    m.trail = m.trail.filter(point => point.age < 1.2);
                    
                    // 判断流星是否离开屏幕，离开后创建新流星
                    const isOffscreen = m.x < -300 || m.x > width + 300 || m.y < -300 || m.y > height + 300;
                    if (isOffscreen) {
                        meteors[i] = createMeteor();
                    }
                }
            }
            
            function drawStars() {
                const now = Date.now();
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    const twinkle = Math.sin(now * s.twinkleSpeed + s.twinklePhase) * 0.4 + 0.6;
                    let brightness = s.brightness * twinkle;
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    
                    // 深层星星稍微暗一点
                    if (s.layer === 'deep') {
                        brightness *= 0.5;
                    }
                    
                    // 鼠标悬停区域星星更亮
                    if (mousePresent) {
                        const dx = mouseX - s.x;
                        const dy = mouseY - s.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 120) {
                            brightness = Math.min(1, brightness * 1.6);
                            ctx.shadowBlur = 6;
                            ctx.shadowColor = `rgba(255, 200, 150, 0.5)`;
                        }
                    }
                    
                    ctx.fillStyle = `rgba(255, 245, 235, ${brightness * 0.9})`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            function drawMeteors() {
                for (let i = 0; i < meteors.length; i++) {
                    const m = meteors[i];
                    
                    // 绘制尾迹：从尾部到头部的渐变，更加自然
                    if (m.trail.length >= 2) {
                        for (let j = 0; j < m.trail.length - 1; j++) {
                            const p1 = m.trail[j];
                            const p2 = m.trail[j + 1];
                            
                            // 根据在尾迹中的位置计算透明度（越靠近头部越亮）
                            const posRatio = j / m.trail.length;
                            const alpha = (1 - posRatio) * 0.85;
                            
                            // 宽度渐变：头部粗，尾部细
                            const lineWidth = m.size * (0.6 + posRatio * 0.8);
                            
                            const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                            gradient.addColorStop(0, m.tailStart.replace('0.9', alpha * 0.8));
                            gradient.addColorStop(0.6, m.tailEnd.replace('0)', `${alpha * 0.4})`));
                            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                            
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = gradient;
                            ctx.lineWidth = lineWidth;
                            ctx.lineCap = 'round';
                            ctx.stroke();
                        }
                    }
                    
                    // 绘制流星头部光晕（多层光晕更真实）
                    // 外层光晕
                    ctx.shadowBlur = 28;
                    ctx.shadowColor = m.headColor.replace('1', '0.7');
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.size * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = m.headColor.replace('1', '0.35');
                    ctx.fill();
                    
                    // 中层光晕
                    ctx.shadowBlur = 18;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.size * 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = m.headColor.replace('1', '0.7');
                    ctx.fill();
                    
                    // 核心亮点
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.size * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = m.headColor;
                    ctx.fill();
                    
                    // 最内层炽热核心
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.size * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 245, 1)';
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            // 添加细微的星云雾气效果，增强深邃感
            let starDustPhase = 0;
            function drawNebulaDust() {
                starDustPhase += 0.003;
                // 极淡的星云雾气，增加层次
                ctx.fillStyle = `rgba(20, 30, 50, 0.03)`;
                ctx.fillRect(0, 0, width, height);
            }
            
            function animate() {
                // 使用更柔和的背景清除方式，保留轻微拖尾感
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fillRect(0, 0, width, height);
                
                // 绘制深层星空背景
                ctx.fillStyle = 'rgba(3, 6, 12, 0.6)';
                ctx.fillRect(0, 0, width, height);
                
                // 星云薄雾
                drawNebulaDust();
                
                // 绘制星星
                drawStars();
                
                // 更新并绘制流星
                updateMeteors();
                drawMeteors();
                
                requestAnimationFrame(animate);
            }
            
            // 鼠标追踪（保留交互）
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mousePresent = true;
            });
            
            document.addEventListener('mouseleave', function() {
                mousePresent = false;
            });
            
            window.addEventListener('resize', function() {
                initCanvas();
            });
            
            initCanvas();
            animate();
        })();
    </script>

</body>
</html>
