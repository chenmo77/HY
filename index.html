<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell - 让美好发声</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        
        .content {
            text-align: center;
            z-index: 1;
            max-width: 90%;
        }
        
        .logo {
            background-color: #e00;
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .link:hover {
            background: rgba(224, 0, 0, 0.8);
            transform: translateY(-5px);
            border-color: white;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #e00;
            animation: spin 1s linear infinite;
        }
        
        img {
            border-radius: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
                padding: 20px 30px;
            }
            
            .link {
                font-size: 1.2rem;
                padding: 12px 25px;
            }
        }

                /* 太空粒子特效样式 */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        
        /* 确保内容在画布之上 */
        .content {
            position: relative;
            z-index: 1;
        }
        
        /* 微调链接样式，让它们在深色背景更明显 */
        .link {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .link:hover {
            background: rgba(224, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(224, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    
    <!-- 背景遮罩 -->
    <div class="overlay"></div>
    
    <!-- 主要内容 -->
    <div class="content">
        <a href="https://space.bilibili.com/377746815" target="_blank"><img src="/img/redlogo.png"></a>
        <div>
            <a href="https://radio.hellyell.com" target="_blank"><img src="/img/diantai.png"></a><a href="https://iptvindex.com" target="_blank"><img src="/img/yingshi.png"></a><a href="https://space.bilibili.com/377746815" target="_blank"><img src="/img/bzhan.png"></a><a href="https://dh.hellyell.com" target="_blank"><img src="/img/daohang.png"></a><br>
            <img src="/img/dibu.png">
        </div>
    </div>
    <!-- 太空流星和粒子特效 -->
    <canvas id="space-canvas"></canvas>
    
    <script>
        (function() {
            const canvas = document.getElementById('space-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let particles = [];
            let shootingStars = [];
            let mouseX = 0, mouseY = 0;
            let mousePresent = false;
            
            // 粒子数量
            const PARTICLE_COUNT = 200;
            // 流星数量（增加数量，确保能看到）
            const SHOOTING_STAR_COUNT = 5;
            
            // 初始化画布
            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                // 初始化粒子
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2 + 0.5,
                        speed: Math.random() * 0.5 + 0.2,
                        opacity: Math.random() * 0.7 + 0.3,
                        angle: Math.random() * Math.PI * 2
                    });
                }
                
                // 初始化流星（立即创建，没有延迟）
                shootingStars = [];
                for (let i = 0; i < SHOOTING_STAR_COUNT; i++) {
                    shootingStars.push(createShootingStar(true));
                }
            }
            
            // 创建一颗新流星
            function createShootingStar(immediate = false) {
                return {
                    x: Math.random() * width * 0.3, // 从左侧开始
                    y: Math.random() * height * 0.4, // 在上半部分
                    length: Math.random() * 150 + 100, // 更长的拖尾
                    speed: Math.random() * 12 + 8, // 更快的速度
                    angle: Math.random() * 20 + 20, // 20-40度角，向右下
                    opacity: Math.random() * 0.7 + 0.3,
                    size: Math.random() * 3 + 1.5, // 更粗的流星
                    delay: immediate ? 0 : Math.random() * 100 // 立即显示或延迟
                };
            }
            
            // 更新粒子位置（受鼠标影响）
            function updateParticles() {
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    
                    // 自然漂移
                    p.x += Math.cos(p.angle) * p.speed * 0.1;
                    p.y += Math.sin(p.angle) * p.speed * 0.1;
                    
                    // 边界检查
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                    
                    // 鼠标影响
                    if (mousePresent) {
                        const dx = mouseX - p.x;
                        const dy = mouseY - p.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 200) {
                            // 粒子远离鼠标
                            const force = (200 - distance) / 200 * 0.03;
                            p.x -= dx * force;
                            p.y -= dy * force;
                        }
                    }
                }
            }
            
            // 更新流星位置
            function updateShootingStars() {
                for (let i = 0; i < shootingStars.length; i++) {
                    let star = shootingStars[i];
                    
                    if (star.delay > 0) {
                        star.delay -= 1;
                        continue;
                    }
                    
                    // 转换为弧度
                    const rad = star.angle * Math.PI / 180;
                    
                    // 移动流星
                    star.x += Math.cos(rad) * star.speed;
                    star.y += Math.sin(rad) * star.speed;
                    
                    // 重置流星
                    if (star.x > width + 200 || star.y > height + 200) {
                        shootingStars[i] = createShootingStar();
                    }
                }
            }
            
            // 绘制粒子
            function drawParticles() {
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    
                    // 根据鼠标距离改变亮度
                    let brightness = p.opacity;
                    if (mousePresent) {
                        const dx = mouseX - p.x;
                        const dy = mouseY - p.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 200) {
                            brightness = Math.min(1, p.opacity * 1.5);
                        }
                    }
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                    ctx.fill();
                }
            }
            
            // 绘制流星
            function drawShootingStars() {
                for (let i = 0; i < shootingStars.length; i++) {
                    let star = shootingStars[i];
                    
                    if (star.delay > 0) continue;
                    
                    const rad = star.angle * Math.PI / 180;
                    
                    ctx.beginPath();
                    ctx.moveTo(star.x, star.y);
                    
                    // 计算尾部终点
                    const tailX = star.x - Math.cos(rad) * star.length;
                    const tailY = star.y - Math.sin(rad) * star.length;
                    
                    // 创建渐变色（更亮的颜色）
                    const gradient = ctx.createLinearGradient(star.x, star.y, tailX, tailY);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
                    gradient.addColorStop(0.3, `rgba(200, 230, 255, ${star.opacity * 0.8})`);
                    gradient.addColorStop(0.7, `rgba(150, 200, 255, ${star.opacity * 0.3})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = star.size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    // 添加头部光晕
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity * 0.5})`;
                    ctx.fill();
                }
            }
            
            // 动画循环
            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                // 绘制背景渐变色（更深的太空）
                const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
                gradient.addColorStop(0, '#0a0c12');
                gradient.addColorStop(0.3, '#050608');
                gradient.addColorStop(1, '#000000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                // 更新和绘制
                updateShootingStars();
                updateParticles();
                drawShootingStars();
                drawParticles();
                
                requestAnimationFrame(animate);
            }
            
            // 鼠标移动追踪
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mousePresent = true;
            });
            
            // 鼠标离开窗口
            document.addEventListener('mouseleave', function() {
                mousePresent = false;
            });
            
            // 窗口大小改变时重新初始化
            window.addEventListener('resize', function() {
                initCanvas();
            });
            
            // 启动特效
            initCanvas();
            animate();
        })();
    </script>

</body>
</html>
