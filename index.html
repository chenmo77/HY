<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell - 让美好发声</title>
    <!-- 修复：使用可用的字体链接 -->
    <link rel="stylesheet" href="https://fonts.zeoseven.com/zsft/api/font/huiwen-mingchao/family.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Huiwen Mingchao', 'LXGW WenKai', 'Noto Serif SC', 'SimHei', serif;
            font-weight: normal;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        
        .content {
            text-align: center;
            z-index: 1;
            max-width: 90%;
        }
        
        /* 修复：改为水平排列，一行显示四个按钮 */
        .content > div {
            display: flex;
            flex-direction: row;      /* 改为水平排列 */
            flex-wrap: wrap;          /* 手机屏幕过窄时可换行 */
            justify-content: center;  /* 水平居中 */
            align-items: center;
            gap: 20px;                /* 按钮之间的间距 */
            margin-top: 30px;
        }
        
        .content a.link {
            display: inline-block;
            min-width: 100px;
        }
        
        .content span {
            margin-top: 20px;
            display: block;           /* 让版权信息独占一行 */
            width: 100%;              /* 占满整行 */
        }
        
        /* 链接样式 */
        .link {
            color: white !important;
            text-decoration: none;
            font-size: 20px;
            padding: 12px 28px;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
        }
        
        .link:visited {
            color: white !important;
        }
        
        .link:hover {
            background: rgba(224, 0, 0, 0.85);
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(224, 0, 0, 0.5);
            font-size: 20px;  /* 保持字号一致，用scale实现放大效果 */
        }
        
        img {
            border-radius: 15px;
            max-width: 280px;
            width: 90%;
        }
        
        /* 响应式：手机屏幕时按钮适当缩小间距 */
        @media (max-width: 560px) {
            .content > div {
                gap: 12px;
            }
            .link {
                font-size: 16px;
                padding: 8px 20px;
            }
        }

        /* 太空粒子特效样式 */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        
        a {
            font-family: 'Huiwen Mingchao', 'LXGW WenKai', 'Noto Serif SC', serif;
        }
    </style>
</head>
<body>
    
    <div class="overlay"></div>
    
    <div class="content">
        <img src="/img/redlogo.png" alt="HellYell Logo">
        <div>
            <a href="https://radio.hellyell.com" target="_blank" class="link">📻 电台</a>
            <a href="https://iptvindex.com" target="_blank" class="link">🎬 影视</a>
            <a href="https://tansuo.tv" target="_blank" class="link">✨ 探索TV</a>
            <a href="https://dh.hellyell.com" target="_blank" class="link">⚡ Win必装</a>
            <span>唛塔文化 © 2016-2026</span>
        </div>
    </div>

    <canvas id="space-canvas"></canvas>
    
    <script>
        // ... 你的流星特效脚本保持不变 ...
        (function() {
            const canvas = document.getElementById('space-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let stars = [];
            let meteors = [];
            let mouseX = 0, mouseY = 0;
            let mousePresent = false;
            
            const METEOR_COUNT = 3;
            const STARS_COUNT = 300;
            
            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                stars = [];
                for (let i = 0; i < STARS_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2 + 0.5,
                        brightness: Math.random() * 0.7 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
                
                meteors = [];
                for (let i = 0; i < METEOR_COUNT; i++) {
                    meteors.push(createMeteor());
                }
            }
            
            function createMeteor() {
                const side = Math.floor(Math.random() * 4);
                let startX, startY;
                
                switch(side) {
                    case 0:
                        startX = -Math.random() * 200;
                        startY = Math.random() * height * 0.6;
                        break;
                    case 1:
                        startX = Math.random() * width;
                        startY = -Math.random() * 200;
                        break;
                    case 2:
                        startX = width + Math.random() * 200;
                        startY = Math.random() * height * 0.6;
                        break;
                    case 3:
                        startX = Math.random() * width;
                        startY = height + Math.random() * 200;
                        break;
                }
                
                const targetX = Math.random() * width * 0.8 + width * 0.1;
                const targetY = Math.random() * height * 0.6 + height * 0.2;
                const angle = Math.atan2(targetY - startY, targetX - startX);
                
                const colorType = Math.random();
                let headColor, tailColor;
                
                if (colorType < 0.6) {
                    headColor = `rgba(255, 255, 255, 1)`;
                    tailColor = `rgba(180, 220, 255, 0.8)`;
                } else if (colorType < 0.8) {
                    headColor = `rgba(255, 220, 180, 1)`;
                    tailColor = `rgba(255, 180, 100, 0.8)`;
                } else {
                    headColor = `rgba(200, 255, 255, 1)`;
                    tailColor = `rgba(150, 230, 255, 0.8)`;
                }
                
                return {
                    x: startX, y: startY,
                    vx: Math.cos(angle) * (Math.random() * 8 + 6),
                    vy: Math.sin(angle) * (Math.random() * 8 + 6),
                    length: Math.random() * 120 + 80,
                    headColor: headColor,
                    tailColor: tailColor,
                    size: Math.random() * 2.5 + 1.5,
                    opacity: Math.random() * 0.4 + 0.6,
                    trail: [],
                    maxTrailLength: Math.floor(Math.random() * 15 + 10)
                };
            }
            
            function updateMeteors() {
                for (let i = meteors.length - 1; i >= 0; i--) {
                    const m = meteors[i];
                    m.trail.push({ x: m.x, y: m.y, opacity: 1 });
                    if (m.trail.length > m.maxTrailLength) m.trail.shift();
                    m.x += m.vx;
                    m.y += m.vy;
                    for (let j = 0; j < m.trail.length; j++) {
                        m.trail[j].opacity = (j + 1) / m.trail.length * 0.7;
                    }
                    if (m.x < -200 || m.x > width + 200 || m.y < -200 || m.y > height + 200) {
                        meteors[i] = createMeteor();
                    }
                }
            }
            
            function drawStars() {
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    const twinkle = Math.sin(Date.now() * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
                    const brightness = s.brightness * twinkle;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                    ctx.fill();
                }
            }
            
            function drawMeteors() {
                for (let i = 0; i < meteors.length; i++) {
                    const m = meteors[i];
                    for (let j = 0; j < m.trail.length - 1; j++) {
                        const point = m.trail[j];
                        const nextPoint = m.trail[j + 1];
                        const gradient = ctx.createLinearGradient(point.x, point.y, nextPoint.x, nextPoint.y);
                        gradient.addColorStop(0, m.tailColor);
                        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(nextPoint.x, nextPoint.y);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = m.size * (1 - j / m.trail.length);
                        ctx.stroke();
                    }
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.size * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = m.headColor;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            function animate() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, width, height);
                drawStars();
                updateMeteors();
                drawMeteors();
                requestAnimationFrame(animate);
            }
            
            window.addEventListener('resize', () => initCanvas());
            initCanvas();
            animate();
        })();
    </script>

</body>
</html>
