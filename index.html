<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellYell - 让美好发声</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background-color: #000000; /* 添加纯黑色背景 */
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        
        .content {
            text-align: center;
            z-index: 1;
            max-width: 90%;
        }
        
        .logo {
            background-color: #e00;
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .link:hover {
            background: rgba(224, 0, 0, 0.8);
            transform: translateY(-5px);
            border-color: white;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #e00;
            animation: spin 1s linear infinite;
        }
        
        img {
            border-radius: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
                padding: 20px 30px;
            }
            
            .link {
                font-size: 1.2rem;
                padding: 12px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <!-- 背景遮罩 -->
    <div class="overlay"></div>
    
    <!-- 主要内容 -->
    <div class="content">
        <a href="https://space.bilibili.com/377746815" target="_blank"><img src="/img/redlogo.png"></a>
        <div>
            <a href="https://radio.hellyell.com" target="_blank"><img src="/img/diantai.png"></a><a href="https://iptvindex.com" target="_blank"><img src="/img/yingshi.png"></a><a href="https://space.bilibili.com/377746815" target="_blank"><img src="/img/bzhan.png"></a><a href="https://hellyell.com/dh.html" target="_blank"><img src="/img/daohang.png"></a><br>
            <img src="/img/dibu.png">
        </div>
    </div>

    <script>
        // 视频加载完成后隐藏加载动画
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('video-background');
            const loading = document.getElementById('loading');
            
            // 如果视频已经可以播放
            if (video.readyState >= 3) {
                hideLoading();
            } else {
                video.addEventListener('canplay', hideLoading);
                video.addEventListener('loadeddata', hideLoading);
                
                // 设置超时，避免加载时间过长
                setTimeout(hideLoading, 3000);
            }
            
            function hideLoading() {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 500);
            }
        });
    </script>
</body>
</html>
